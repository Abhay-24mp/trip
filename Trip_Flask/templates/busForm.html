<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>Search Buses - Trip Connect</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Raleway:300,300i,400,400i,500,500i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="/static/assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="/static/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">

  <!-- Template Main CSS File -->
  <link href="/static/assets/css/style.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; }
    #header { background: rgba(20, 30, 48, 0.9); }
    
    .hero-search {
      width: 100%;
      height: 60vh;
      background: linear-gradient(to right, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('/static/assets/img/hero-bg.jpg') center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 80px;
    }

    .form-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 800px;
    }

    .form-container h2 {
      color: #fff;
      font-weight: 700;
      margin-bottom: 25px;
      text-align: center;
    }

    .form-group label {
      color: #fff;
      margin-bottom: 8px;
    }

    .btn-search {
      background: #ff7a18;
      color: #fff;
      padding: 12px 30px;
      border-radius: 5px;
      border: none;
      font-weight: 600;
      transition: 0.3s;
      width: 100%;
      margin-top: 20px;
    }

    .btn-search:hover {
      background: #ff8b33;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="fixed-top header-inner-pages">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="logo"><a href="/">Trip Connect</a></h1>
      <nav id="navbar" class="navbar">
        <ul>
          <li><a class="nav-link" href="/">Home</a></li>
          <li><a class="nav-link active" href="/buses.html">Buses</a></li>
          <li><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
          <li><a class="nav-link" href="/first">Logout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ======= Hero Search ======= -->
  <section class="hero-search">
    <div class="container" data-aos="zoom-in">
      <div class="form-container mx-auto">
        <h2>Find Your Perfect Ride</h2>
        <form action="/SearchBus" method="post">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label text-white small">Departure City</label>
              <select name="from" class="form-select" required>
                <option value="" disabled selected>Select City</option>
                {% for city in from_cities %}
                  <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label text-white small">Destination City</label>
              <select name="to" class="form-select" required>
                <option value="" disabled selected>Select City</option>
                {% for city in to_cities %}
                  <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
                <label class="form-label text-white">Travel Date</label>
              <input type="date" name="date" class="form-control" required>
            </div>
          </div>
          <button type="submit" class="btn-search">Search Buses</button>
        </form>
      </div>
    </div>
  </section>

  <!-- ======= Footer ======= -->
  <footer id="footer" class="mt-5">
    <div class="container py-4 text-center">
      <div class="copyright">
        &copy; Copyright <strong><span>Trip Connect</span></strong>. All Rights Reserved
      </div>
    </div>
  </footer>

  <!-- Vendor JS Files -->
  <script src="/static/assets/vendor/aos/aos.js"></script>
  <script src="/static/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
