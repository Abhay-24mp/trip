<!DOCTYPE html>
<html>
<head>
    <title>Hotel Results</title>
    <style>
        body { font-family: 'Poppins', sans-serif; padding: 40px; background: #f8f9fa; }
        .result-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hotel-item { padding: 15px; border-bottom: 1px solid #eee; }
        .hotel-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="result-container">
    <h2>Search Results</h2>
    <p><b>Location:</b> {{ location }}</p>
    <p><b>Check-in:</b> {{ checkin }}</p>
    <p><b>Check-out:</b> {{ checkout }}</p>
    <p><b>Guests:</b> {{ guests }}</p>

    <hr>

    <h3>Available Hotels:</h3>

    {% if hotelList %}
        {% for h in hotelList %}
            <div class="hotel-item">
                <p>{{ h }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No hotels found matching your criteria.</p>
    {% endif %}
    
    <br>
    <a href="/hotels.html">Back to Search</a>
</div>

</body>
</html>
