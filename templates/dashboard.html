

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Connect Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(rgba(210, 201, 201, 0.6),rgba(60, 53, 53, 0.6)),
  url('https://images.unsplash.com/photo-1541410965313-d53b3c16ef17?') no-repeat center/cover;
  color:black;
}

/* Sidebar */
.sidebar{
  width:240px;
  background:rgba(141, 134, 134, 0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:22px;
  font-weight:600;
  margin-bottom:30px;
}

.menu a{
  text-decoration:none;
  color:black;
  padding:12px;
  display:block;
  border-radius:10px;
  margin-bottom:10px;
  transition:0.3s;
}

.menu a:hover{
  background:rgba(173, 166, 166, 0.2);
}

/* Main */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Topbar */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.1);
  /*backdrop-filter:blur(12px);*/
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:35px;
  height:35px;
  border-radius:50%;
}

/* Content */
.content{
  padding:25px;
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.03);
}

/* Services */
.services{
  margin-top:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  font:bold;
}

.service-card{
  padding:20px;
  border-radius:15px;
  text-align:center;
  background:rgba(255,255,255,0.15);
  /*backdrop-filter:blur(12px);*/
  transition:0.3s;
  text-decoration:none;
  color:black;
  font:bold;
}

.service-card:hover{
  transform:translateY(-8px);
  background:rgba(255,255,255,0.25);
}

/* Responsive */
@media(max-width:768px){
  .sidebar{
    display:none;
  }
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">TripConnect</div>

  <div class="menu">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="hotels">🏨 Hotels</a>
    <a href="busindex.html">🚌 Buses</a>
    <a href="cars.html">🚗 Cars</a>
    <a href="mybooking.html">My Bookings</a>
    <a href="first"> Logout </a>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <h1>Welcome To Dashboard</h1>

   
  </div>

  <!-- Content -->
  
  <div class="content">

   

    <!-- Services -->
    <div class="services">
      <h2>Quick Access</h2>

      <div class="grid">
        <a href="hotels" class="service-card">🏨 Hotels</a>
        <a href="busindex.html" class="service-card">🚌 Buses</a>
        <a href="cars.html" class="service-card">🚗 Cars</a>
        <a href="mybooking.html" class="service-card">My Bookings</a>
      </div>
    </div>

  </div>

</div>

</body>
</html>
