<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <title>Rent a Car - Trip Connect</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="/static/assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="/static/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">

  <!-- Template Main CSS File -->
  <link href="/static/assets/css/style.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #ff5e14;
      --secondary-color: #ff8e53;
      --gradient-bg: linear-gradient(135deg, #f4f6f9 0%, #eef2f7 100%);
      --text-dark: #1e293b;
      --text-light: #64748b;
    }

    body {
      background: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .price-tag,
    .btn-search {
      font-family: 'Outfit', sans-serif;
    }

    #header {
      background: rgba(20, 30, 48, 0.95);
      backdrop-filter: blur(10px);
    }

    .hero-cars {
      width: 100%;
      height: 70vh;
      background: linear-gradient(to right, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.4)), url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') center center;
      background-size: cover;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 80px;
      position: relative;
    }

    .hero-cars::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(to top, #f8fafc, transparent);
    }

    .search-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      padding: 45px 50px;
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 900px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      z-index: 10;
    }

    .search-container h2 {
      font-size: 2.5rem;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .form-control,
    .form-select {
      height: 55px;
      border-radius: 12px;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.9);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-dark);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary-color);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 94, 20, 0.2);
      outline: none;
    }

    .form-label {
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: #e2e8f0 !important;
      margin-bottom: 8px;
    }

    .btn-search {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: #fff;
      height: 55px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      width: 100%;
      border: none;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: 0 10px 25px rgba(255, 94, 20, 0.3);
    }

    .btn-search::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
      z-index: -1;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .btn-search:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(255, 94, 20, 0.4);
    }

    .btn-search:hover::before {
      opacity: 1;
    }

    .section-title {
      font-size: 2.5rem;
      color: var(--text-dark);
      position: relative;
      display: inline-block;
      margin-bottom: 3.5rem;
      font-weight: 800;
    }

    .section-title::after {
      content: '';
      position: absolute;
      width: 60%;
      height: 4px;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
    }

    .car-card {
      border: none;
      border-radius: 20px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      margin-bottom: 40px;
      position: relative;
    }

    .car-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    .img-wrapper {
      overflow: hidden;
      position: relative;
      padding-top: 60%;
      /* 16:9 Aspect Ratio somewhat */
    }

    .car-card img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .car-card:hover img {
      transform: scale(1.08);
    }

    .car-badge-sm {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      color: var(--text-dark);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 2;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .car-details-wrapper {
      padding: 25px;
    }

    .car-card h4 {
      font-weight: 800;
      color: var(--text-dark);
      font-size: 1.5rem;
      margin-bottom: 12px;
    }

    .car-specs {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-light);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .car-specs span {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .price-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
    }

    .price-tag {
      color: var(--text-dark);
      font-weight: 800;
      font-size: 1.6rem;
      display: flex;
      align-items: baseline;
    }

    .price-currency {
      color: var(--primary-color);
      font-size: 1.1rem;
      margin-right: 2px;
    }

    .price-tag small {
      color: var(--text-light);
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      margin-left: 5px;
    }

    .btn-details {
      background: transparent;
      color: var(--primary-color);
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      border: 2px solid var(--primary-color);
      padding: 8px 20px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .btn-details:hover {
      background: var(--primary-color);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255, 94, 20, 0.3);
    }
  </style>
</head>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="fixed-top header-inner-pages">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="logo"><a href="/">Trip Connect</a></h1>
      <nav id="navbar" class="navbar">
        <ul>
          <li><a class="nav-link" href="/">Home</a></li>
          <li><a class="nav-link active" href="/cars.html">Cars</a></li>
          <li><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
          <li><a class="nav-link" href="/first">Logout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ======= Hero Section ======= -->
  <section class="hero-cars">
    <div class="container" data-aos="zoom-in" data-aos-duration="1000">
      <div class="search-container mx-auto">
        <h2 class="text-white text-center mb-4 fw-bold">Find Your Perfect Drive</h2>
        <form action="/SearchCar" method="post">
          <div class="row g-3">
            <div class="col-md-5">
              <label class="form-label">Pickup City</label>
              <select name="city" class="form-select" required>
                <option value="" disabled selected>Select City</option>
                {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Travel Date</label>
              <input type="date" class="form-control" required>
            </div>
            <div class="col-md-3 d-flex align-items-end">
              <button type="submit" class="btn-search">
                <i class="bi bi-search me-1"></i> Search
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- ======= Featured Cars ======= -->
  <section class="container py-5 mt-4">
    <div class="text-center" data-aos="fade-up">
      <h3 class="section-title">Our Premium Fleet</h3>
    </div>

    <div class="row mt-4">
      <!-- Static Sample Cars for visual consistency before search -->
      <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
        <div class="car-card">
          <div class="img-wrapper">
            <span class="car-badge-sm"><i class="bi bi-star-fill text-warning me-1"></i> Luxury</span>
            <img
              src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?ixlib=rb-4.0.3&w=800&fit=crop&q=80&fm=jpg"
              alt="Mercedes S-Class">
          </div>
          <div class="car-details-wrapper">
            <h4>Mercedes S-Class</h4>
            <div class="car-specs">
              <span><i class="bx bx-cog me-1 text-primary"></i> Auto</span>
              <span><i class="bx bx-user me-1 text-primary"></i> 4 Seats</span>
            </div>
            <div class="price-container">
              <div class="price-tag">
                <span class="price-currency">₹</span>12,000 <small>/ day</small>
              </div>
              <button class="btn-details">Details</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
        <div class="car-card">
          <div class="img-wrapper">
            <span class="car-badge-sm"><i class="bi bi-star-fill text-warning me-1"></i> Sports</span>
            <img
              src="https://images.unsplash.com/photo-1634673970798-a15ae56f6c65?q=80&w=2428&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt="Porsche 911">
          </div>
          <div class="car-details-wrapper">
            <h4>Porsche 911</h4>
            <div class="car-specs">
              <span><i class="bx bx-cog me-1 text-primary"></i> Auto</span>
              <span><i class="bx bx-user me-1 text-primary"></i> 2 Seats</span>
            </div>
            <div class="price-container">
              <div class="price-tag">
                <span class="price-currency">₹</span>25,000 <small>/ day</small>
              </div>
              <button class="btn-details">Details</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4" data-aos="fade-up" data-aos-delay="300">
        <div class="car-card">
          <div class="img-wrapper">
            <span class="car-badge-sm"><i class="bi bi-star-fill text-warning me-1"></i> SUV</span>
            <img
              src="https://images.unsplash.com/photo-1563720223185-11003d516935?ixlib=rb-4.0.3&w=800&fit=crop&q=80&fm=jpg"
              alt="Range Rover">
          </div>
          <div class="car-details-wrapper">
            <h4>Range Rover</h4>
            <div class="car-specs">
              <span><i class="bx bx-cog me-1 text-primary"></i> Auto</span>
              <span><i class="bx bx-user me-1 text-primary"></i> 5 Seats</span>
            </div>
            <div class="price-container">
              <div class="price-tag">
                <span class="price-currency">₹</span>15,000 <small>/ day</small>
              </div>
              <button class="btn-details">Details</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ======= Footer ======= -->
  <footer id="footer">
    <div class="container py-4 text-center text-secondary small fw-medium">
      &copy; Copyright <strong><span>Trip Connect</span></strong>. All Rights Reserved
    </div>
  </footer>

  <!-- Vendor JS Files -->
  <script src="/static/assets/vendor/aos/aos.js"></script>
  <script src="/static/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    AOS.init({
      duration: 800,
      once: true
    });
  </script>

</body>

</html>
