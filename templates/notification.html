<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title or 'Notification' }} – TripConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    /* Animated blobs in background */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: floatBlob 8s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: #f97316; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #6366f1; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob-3 { width: 200px; height: 200px; background: #10b981; top: 50%; left: 50%; animation-delay: 4s; }

    @keyframes floatBlob {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 56px 48px 44px;
      max-width: 440px;
      width: 92%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.75) translateY(40px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* Icon circle */
    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: iconPop 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes iconPop {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }

    .icon-wrap.success {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 0 0 12px rgba(16,185,129,0.15), 0 0 40px rgba(16,185,129,0.3);
    }
    .icon-wrap.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 0 0 12px rgba(239,68,68,0.15), 0 0 40px rgba(239,68,68,0.3);
    }
    .icon-wrap.info {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 0 0 12px rgba(99,102,241,0.15), 0 0 40px rgba(99,102,241,0.3);
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Checkmark draw animation */
    .check-path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.5s 0.7s ease forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Countdown bar */
    .countdown-bar {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .countdown-fill {
      height: 100%;
      border-radius: 99px;
      width: 100%;
      animation: shrink {{ redirect_delay or 3 }}s linear forwards;
    }
    .countdown-fill.success { background: linear-gradient(90deg, #10b981, #34d399); }
    .countdown-fill.error   { background: linear-gradient(90deg, #ef4444, #f87171); }
    .countdown-fill.info    { background: linear-gradient(90deg, #6366f1, #818cf8); }

    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%;   }
    }

    /* Button */
    .btn {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .btn:active { transform: translateY(0); }

    .btn.success { background: linear-gradient(135deg, #10b981, #059669); color: #fff; box-shadow: 0 4px 16px rgba(16,185,129,0.4); }
    .btn.error   { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; box-shadow: 0 4px 16px rgba(239,68,68,0.4); }
    .btn.info    { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,0.4); }

    .redirect-text {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      margin-top: 18px;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  {% set type = notif_type or 'success' %}

  <div class="card">
    <div class="icon-wrap {{ type }}">
      {% if type == 'success' %}
      <svg viewBox="0 0 24 24">
        <path class="check-path" d="M5 13l4 4L19 7"/>
      </svg>
      {% elif type == 'error' %}
      <svg viewBox="0 0 24 24">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
      {% else %}
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4M12 16h.01"/>
      </svg>
      {% endif %}
    </div>

    <div class="title">{{ title or 'Notification' }}</div>
    <div class="message">{{ message }}</div>

    {% if redirect_url %}
    <div class="countdown-bar">
      <div class="countdown-fill {{ type }}"></div>
    </div>
    {% endif %}

    <a href="{{ redirect_url or '/' }}" class="btn {{ type }}">Continue</a>

    {% if redirect_url %}
    <div class="redirect-text">Redirecting automatically…</div>
    {% endif %}
  </div>

  {% if redirect_url %}
  <script>
    setTimeout(() => {
      window.location.href = "{{ redirect_url }}";
    }, {{ (redirect_delay or 3) * 1000 }});
  </script>
  {% endif %}

</body>
</html>
