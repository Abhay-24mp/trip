<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login - Trip Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="/static/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #ff5e14;
      --secondary: #ff8e53;
      --text-dark: #1e293b;
      --text-light: #64748b;
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      background: #f8fafc;
    }
    h1, h2, h3, h4, .btn-submit, .logo {
      font-family: 'Outfit', sans-serif;
    }
    .auth-bg {
      flex: 1;
      background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=1600') center/cover no-repeat;
      display: none;
    }
    @media(min-width: 992px) {
      .auth-bg { display: block; }
    }
    .auth-panel {
      width: 100%;
      max-width: 550px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      position: relative;
      z-index: 2;
    }
    .logo-container {
      margin-bottom: 50px;
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      text-decoration: none;
    }
    .auth-header {
      margin-bottom: 30px;
    }
    .auth-header h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }
    .auth-header p {
      color: var(--text-light);
      font-size: 1.05rem;
    }
    .form-control {
      height: 55px;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      background: #f8fafc;
      padding: 10px 20px;
      font-weight: 500;
      color: var(--text-dark);
      transition: all 0.3s;
    }
    .form-control:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 94, 20, 0.1);
    }
    .form-label {
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      height: 55px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.15rem;
      border: none;
      width: 100%;
      margin-top: 20px;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(255, 94, 20, 0.3);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(255, 94, 20, 0.4);
    }
    .back-home {
      position: absolute;
      top: 30px;
      left: 30px;
      color: var(--text-light);
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.3s;
    }
    .back-home:hover {
      color: var(--primary);
    }
    .auth-extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      font-size: 0.95rem;
    }
    .auth-extras a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }
    .auth-extras a:hover {
      color: var(--secondary);
    }
    .form-check-input:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }
    .signup-link {
      text-align: center;
      margin-top: 30px;
      color: var(--text-light);
      font-weight: 500;
    }
    .signup-link a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }
    @media (max-width: 480px) {
      .auth-panel { padding: 30px 20px; }
      .auth-header h2 { font-size: 1.8rem; }
      .logo { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-panel">
    <a href="/" class="back-home"><i class="bi bi-arrow-left"></i> Home</a>
    
    <div class="logo-container">
      <a href="/" class="logo">TripConnect</a>
    </div>

    <div class="auth-header text-center">
      <h2>Welcome Back</h2>
      <p>Log in to access your amazing trips</p>
    </div>

    <form action="/Ulog" method="post">
      <div class="mb-4">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 border-2" style="border-color: #e2e8f0; border-radius: 12px 0 0 12px;"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="hello@example.com" required style="border-radius: 0 12px 12px 0;">
        </div>
      </div>
      
      <div class="mb-4">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 border-2" style="border-color: #e2e8f0; border-radius: 12px 0 0 12px;"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required style="border-radius: 0 12px 12px 0;">
        </div>
      </div>
      
      <div class="auth-extras">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" checked>
          <label class="form-check-label text-muted font-weight-500" for="rememberMe">Remember Me</label>
        </div>
        <a href="/forgot.html">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-submit">Log In</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="/signin.html">Sign Up</a>
      <div class="mt-3">
        <a href="/admin/login" class="text-muted small" style="text-decoration: none; font-weight: 600;"><i class="bi bi-shield-lock me-1"></i> Login as Admin</a>
      </div>
    </div>
  </div>
</body>
</html>
