<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP – TripConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
      animation: floatBlob 9s ease-in-out infinite alternate;
    }
    .blob-1 { width: 350px; height: 350px; background: #10b981; top: -80px; right: -80px; }
    .blob-2 { width: 300px; height: 300px; background: #6366f1; bottom: -80px; left: -80px; animation-delay: 4s; }

    @keyframes floatBlob {
      from { transform: translate(0,0); }
      to   { transform: translate(20px, 18px); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 420px;
      width: 92%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 0 14px rgba(16,185,129,0.12), 0 0 30px rgba(16,185,129,0.25);
    }
    .card-icon svg {
      width: 34px; height: 34px;
      stroke: #fff; stroke-width: 2.2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    h2 {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .email-highlight {
      color: #10b981;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    /* OTP input special styling */
    input[name="otp"] {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.4em;
    }

    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: rgba(16,185,129,0.6);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 20px;
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(16,185,129,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(16,185,129,0.55);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 22px;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.8); }
    .back-link span { color: #10b981; font-weight: 600; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2H4.18A2 2 0 0 1 2 19.92v-3"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>

    <h2>Verify Your OTP</h2>
    <p class="subtitle">Enter the 4-digit code sent to your email and choose a new password.</p>

    <form action="/VerifyOTP" method="post">
      <div class="form-group">
        <label for="otp">OTP Code</label>
        <input type="text" id="otp" name="otp" placeholder="• • • •" maxlength="4" required autofocus/>
      </div>

      <div class="divider">new password</div>

      <div class="form-group">
        <label for="password">New Password</label>
        <!-- FIX: name must be 'password' to match app.py request.form.get('password') -->
        <input type="password" id="password" name="password" placeholder="Enter new password" required/>
      </div>

      <button type="submit" class="btn-submit">Reset Password →</button>
    </form>

    <a href="/forgot.html" class="back-link">Didn't get the code? <span>Resend OTP</span></a>
  </div>
</body>
</html>
