<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – TripConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
      animation: floatBlob 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 400px; height: 400px; background: #f97316; top: -100px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: #6366f1; bottom: -80px; right: -80px; animation-delay: 3s; }

    @keyframes floatBlob {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(25px, 15px) scale(1.08); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 420px;
      width: 92%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 0 14px rgba(249,115,22,0.12), 0 0 30px rgba(249,115,22,0.25);
    }
    .card-icon svg {
      width: 34px; height: 34px;
      stroke: #fff; stroke-width: 2.2;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    h2 {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      margin-bottom: 28px;
    }

    input[type="email"]::placeholder { color: rgba(255,255,255,0.25); }
    input[type="email"]:focus {
      border-color: rgba(249,115,22,0.6);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(249,115,22,0.55);
    }
    .btn-submit:active { transform: translateY(0); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 22px;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.8); }
    .back-link span { color: #f97316; font-weight: 600; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter your registered email and we'll send you a one-time verification code.</p>

    <form action="/SendOTP" method="post">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus/>
      <button type="submit" class="btn-submit">Send OTP →</button>
    </form>

    <a href="/login.html" class="back-link">Remember it? <span>Back to Login</span></a>
  </div>
</body>
</html>
