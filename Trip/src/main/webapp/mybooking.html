<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Booking</title>
</head>
<body>
<div id="track" style="padding:30px; text-align:center;">

  <h2>Check Your Booking</h2>

  <form action="ViewBookings" method="get" style="margin-top:20px;">
    
    <input type="text" name="mobile" placeholder="Enter Mobile Number" required 
           style="padding:10px; width:250px; border-radius:8px; border:1px solid #ccc;">
    
    <br><br>
    
    <button type="submit" 
            style="padding:10px 20px; background:red; color:white; border:none; border-radius:8px;">
      View My Bookings
    </button>

  </form>

</div>
</body>
</html>
