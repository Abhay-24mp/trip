<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin-top: 100px;
        }
        .box {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<form action="SendOTP" method="post">
    <input type="email" name="email" placeholder="Enter Email" required>
    <button type="submit">Send OTP</button>
</form>

</div>

</body>
</html>
