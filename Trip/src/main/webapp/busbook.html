<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Connect - Bus Booking</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
    }

    .container {
        width: 400px;
        margin: 40px auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Bus Booking - Trip Connect</h2>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>From</label>
        <input type="text" placeholder="Departure city" required>

        <label>To</label>
        <input type="text" placeholder="Destination city" required>

        <label>Travel Date</label>
        <input type="date" required>

        <label>Bus Type</label>
        <select>
            <option>AC Sleeper</option>
            <option>Non-AC Sleeper</option>
            <option>AC Seater</option>
            <option>Non-AC Seater</option>
        </select>

        <label>No. of Passengers</label>
        <input type="number" min="1" max="10" required>

        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter phone number" required>

        <button type="submit">Book Now</button>
    </form>
</div>

</body>
</html>
